<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏓 Ping ! Buzzer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 10px;
            color: white;
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 20, 50, 0.85);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.hidden {
            display: none;
        }

        .modal {
            background: linear-gradient(160deg, #1a3360 0%, #0f2040 100%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 40px 36px 36px;
            max-width: 380px;
            width: 90%;
            text-align: center;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
        }

        .modal-icon {
            font-size: 44px;
            margin-bottom: 14px;
            display: block;
        }

        .modal h2 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            color: #fff;
        }

        .modal p {
            font-size: 13px;
            opacity: 0.65;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .modal-choices {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .modal-btn {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 20px;
            border-radius: 12px;
            border: 1.5px solid rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.07);
            color: white;
            cursor: pointer;
            transition: all 0.18s ease;
            text-align: left;
        }

        .modal-btn:hover {
            background: rgba(255, 255, 255, 0.14);
            border-color: rgba(255, 255, 255, 0.35);
            transform: translateY(-1px);
        }

        .modal-btn:active {
            transform: translateY(1px);
        }

        .modal-btn-icon {
            font-size: 26px;
            flex-shrink: 0;
        }

        .modal-btn-label {
            font-size: 14px;
            font-weight: 600;
            line-height: 1.35;
        }

        .modal-btn-sub {
            font-size: 11px;
            opacity: 0.6;
            margin-top: 2px;
            font-weight: 400;
        }

        /* ===== APP ===== */
        .header {
            text-align: center;
            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .timer-settings {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 10px 15px;
            margin: 0 auto 15px;
            max-width: 350px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .timer-settings label {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 8px;
            display: block;
        }

        .timer-input {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
        }

        .timer-input input {
            width: 80px;
            height: 45px;
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            outline: none;
            transition: all 0.2s;
        }

        .timer-input input:focus {
            border-color: rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.25);
        }

        .timer-input input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .timer-unit {
            font-size: 18px;
            opacity: 0.8;
        }

        .buzzer-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex: 1;
            gap: 15px;
        }

        .countdown-display {
            font-size: 80px;
            font-weight: bold;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.4);
            min-height: 100px;
        }

        .countdown-display.warning {
            color: #ff6b6b;
            animation: pulse 0.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .buzzer {
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff4757, #e63946, #d62828);
            border: none;
            box-shadow: 
                0 15px 50px rgba(0, 0, 0, 0.4),
                inset 0 -8px 20px rgba(0, 0, 0, 0.3),
                inset 0 8px 20px rgba(255, 255, 255, 0.2);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.1s ease;
            user-select: none;
            position: relative;
            outline: none;
        }

        .buzzer:active {
            transform: translateY(5px);
            box-shadow: 
                0 8px 25px rgba(0, 0, 0, 0.4),
                inset 0 -4px 10px rgba(0, 0, 0, 0.4),
                inset 0 4px 10px rgba(255, 255, 255, 0.1);
        }

        .buzzer-text {
            font-family: Impact, 'Arial Black', sans-serif;
            font-size: 52px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: white;
            text-shadow: 
                3px 3px 0px rgba(0, 0, 0, 0.3),
                5px 5px 0px rgba(0, 0, 0, 0.2),
                7px 7px 0px rgba(0, 0, 0, 0.1);
            transform: scaleY(1.2);
        }

        .status-message {
            font-size: 22px;
            font-weight: bold;
            min-height: 30px;
            opacity: 0.9;
        }

        .status-message.penalty {
            color: #ff6b6b;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .pause-hint {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <!-- ===== POP-UP CHOIX ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <span class="modal-icon">🏓</span>
            <h2>Ping ! — Coup de stress</h2>
            <div class="modal-choices">
                <button class="modal-btn" onclick="choisirMode('2joueurs')">
                    <span class="modal-btn-icon"><span style="letter-spacing:-16px">🧍🧍</span></span>
                    <div>
                        <div class="modal-btn-label">Coup de stress pour les deux joueurs</div>
                    </div>
                </button>
                <button class="modal-btn" onclick="choisirMode('1joueur')">
                    <span class="modal-btn-icon">🧍</span>
                    <div>
                        <div class="modal-btn-label">Coup de stress pour 1 joueur</div>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <!-- ===== APP ===== -->
    <div class="header">
        <h1 id="mainTitle">🏓 Ping ! Buzzer</h1>
        <p id="mainSubtitle">Buzzer avec décompte pour votre partie de Ping !</p>
    </div>

    <div class="timer-settings">
        <label>⏱️ Temps de réflexion (secondes)</label>
        <div class="timer-input">
            <input type="number" id="timerInput" value="25" min="1" max="60" onchange="game.updateTime()">
            <span class="timer-unit">sec</span>
        </div>
    </div>

    <div class="buzzer-container">
        <div class="countdown-display" id="countdown">--</div>
        
        <button class="buzzer" id="buzzer" onclick="game.handleBuzzer()" ondblclick="game.togglePause()">
            <div class="buzzer-text">BUZZER</div>
        </button>

        <div class="status-message" id="status"></div>
        <div class="pause-hint" id="pauseHint">Double-clic pour pause</div>
    </div>

    <script>
        // ===== CHOIX DU MODE =====
        let currentMode = '2joueurs'; // défaut

        function choisirMode(mode) {
            currentMode = mode;
            document.getElementById('modalOverlay').classList.add('hidden');

            // Adapter le titre et les hints selon le mode
            if (mode === '1joueur') {
                document.getElementById('mainTitle').textContent = '🏓 Ping ! Buzzer — 1 joueur';
                document.getElementById('mainSubtitle').textContent = 'Clic = démarrer · Clic suivant = arrêter et remettre à zéro';
                document.getElementById('pauseHint').textContent = '';
            } else {
                document.getElementById('mainTitle').textContent = '🏓 Ping ! Buzzer — 2 joueurs';
                document.getElementById('mainSubtitle').textContent = 'Buzzer avec décompte pour votre partie de Ping !';
                document.getElementById('pauseHint').textContent = 'Double-clic pour pause';
            }

            // Initialiser le jeu après choix du mode
            game = new PingBuzzer(mode);
        }

        // ===== CLASSE BUZZER =====
        class PingBuzzer {
            constructor(mode) {
                this.mode = mode || '2joueurs';
                this.maxTime = 25;
                this.currentTime = 0;
                this.isRunning = false;
                this.isPaused = false;
                this.interval = null;
                this.audioContext = null;

                // Initialisation de l'AudioContext au premier clic
                document.addEventListener('click', () => {
                    if (!this.audioContext) {
                        this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    }
                }, { once: true });
            }

            updateTime() {
                if (this.isRunning) return;

                const input = document.getElementById('timerInput');
                let value = parseInt(input.value);

                if (isNaN(value) || value < 1) {
                    value = 1;
                } else if (value > 60) {
                    value = 60;
                }

                this.maxTime = value;
                input.value = value;
            }

            playPaddleSound() {
                if (!this.audioContext) return;

                const ctx = this.audioContext;
                const now = ctx.currentTime;

                const osc = ctx.createOscillator();
                const gain = ctx.createGain();

                osc.connect(gain);
                gain.connect(ctx.destination);

                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(500, now + 0.04);

                gain.gain.setValueAtTime(0.8, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.03);

                osc.start(now);
                osc.stop(now + 0.03);
            }

            playTickSound() {
                if (!this.audioContext) return;

                const ctx = this.audioContext;
                const now = ctx.currentTime;

                const osc = ctx.createOscillator();
                const gain = ctx.createGain();

                osc.connect(gain);
                gain.connect(ctx.destination);

                osc.type = 'sine';
                osc.frequency.setValueAtTime(1000, now);

                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);

                osc.start(now);
                osc.stop(now + 0.05);
            }

            playNormalTicSound() {
                if (!this.audioContext) return;

                const ctx = this.audioContext;
                const now = ctx.currentTime;

                const osc = ctx.createOscillator();
                const gain = ctx.createGain();

                osc.connect(gain);
                gain.connect(ctx.destination);

                osc.type = 'sine';
                osc.frequency.setValueAtTime(1200, now);

                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.04);

                osc.start(now);
                osc.stop(now + 0.04);
            }

            playNormalTacSound() {
                if (!this.audioContext) return;

                const ctx = this.audioContext;
                const now = ctx.currentTime;

                const osc = ctx.createOscillator();
                const gain = ctx.createGain();

                osc.connect(gain);
                gain.connect(ctx.destination);

                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);

                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.04);

                osc.start(now);
                osc.stop(now + 0.04);
            }

            playPenaltySound() {
                if (!this.audioContext) return;

                const ctx = this.audioContext;
                const now = ctx.currentTime;

                const oscillator = ctx.createOscillator();
                const gainNode = ctx.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(ctx.destination);

                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(400, now);
                oscillator.frequency.exponentialRampToValueAtTime(100, now + 0.5);

                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);

                oscillator.start(now);
                oscillator.stop(now + 0.5);
            }

            handleBuzzer() {
                if (this.mode === '1joueur') {
                    this.handleBuzzer1Joueur();
                } else {
                    this.handleBuzzer2Joueurs();
                }
            }

            // ---- Mode 2 joueurs : comportement original ----
            handleBuzzer2Joueurs() {
                if (this.isPaused) return;
                this.playPaddleSound();
                this.startCountdown();
            }

            // ---- Mode 1 joueur : toggle start / stop+reset ----
            handleBuzzer1Joueur() {
                if (this.isRunning) {
                    // Arrêter et remettre à zéro
                    this.stopAndReset();
                } else {
                    // Démarrer
                    this.playPaddleSound();
                    this.startCountdown();
                }
            }

            stopAndReset() {
                clearInterval(this.interval);
                this.isRunning = false;
                this.isPaused = false;
                this.currentTime = 0;

                const countdown = document.getElementById('countdown');
                countdown.textContent = '--';
                countdown.className = 'countdown-display';

                const status = document.getElementById('status');
                status.textContent = '';
                status.className = 'status-message';
            }

            startCountdown() {
                this.currentTime = this.maxTime;
                this.isRunning = true;
                this.isTic = true;
                this.updateDisplay();
                document.getElementById('status').textContent = '';
                document.getElementById('status').className = 'status-message';

                if (this.interval) {
                    clearInterval(this.interval);
                }

                this.interval = setInterval(() => {
                    if (this.isPaused) return;

                    this.currentTime--;
                    this.updateDisplay();

                    if (this.currentTime > 0) {
                        if (this.currentTime <= 5) {
                            this.playTickSound();
                        } else {
                            if (this.isTic) {
                                this.playNormalTicSound();
                            } else {
                                this.playNormalTacSound();
                            }
                            this.isTic = !this.isTic;
                        }
                    }

                    if (this.currentTime <= 0) {
                        this.handleTimeout();
                    }
                }, 1000);
            }

            handleTimeout() {
                clearInterval(this.interval);
                this.isRunning = false;

                this.playPenaltySound();

                const status = document.getElementById('status');
                status.textContent = '⚠️ TEMPS ÉCOULÉ !';
                status.className = 'status-message penalty';

                this.updateDisplay();
            }

            updateDisplay() {
                const countdown = document.getElementById('countdown');

                if (this.currentTime > 0) {
                    countdown.textContent = this.currentTime + 's';

                    if (this.currentTime <= 5 && this.isRunning) {
                        countdown.className = 'countdown-display warning';
                    } else {
                        countdown.className = 'countdown-display';
                    }
                } else if (this.isRunning || this.currentTime === 0) {
                    countdown.textContent = '0s';
                    countdown.className = 'countdown-display';
                } else {
                    countdown.textContent = '--';
                    countdown.className = 'countdown-display';
                }
            }

            togglePause() {
                if (this.mode === '1joueur') return; // pas de pause en mode 1 joueur
                if (!this.isRunning) return;

                this.isPaused = !this.isPaused;

                const status = document.getElementById('status');
                if (this.isPaused) {
                    status.textContent = '⏸️ PAUSE';
                    status.className = 'status-message';
                } else {
                    status.textContent = '';
                }
            }
        }

        // Instance temporaire — remplacée après le choix du mode
        let game = new PingBuzzer('2joueurs');
    </script>
</body>
</html>
